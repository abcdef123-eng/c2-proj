syntax = "proto3";

package pb;

option go_package = "modules/pb";

// ── Shared ────────────────────────────────────────────────────────────────────

message EmptyRequest {}

// ── Health check ──────────────────────────────────────────────────────────────

message HealthCheckResponse {
    string status = 1;
}

// ── Commands ──────────────────────────────────────────────────────────────────

// Sent by the operator client for every action (insert command, list clients, resolve ID, etc.)
message CommandReqData {
    string action       = 1;
    string guid         = 2;
    int32  command_code = 3;
    string param        = 4;
    string param2       = 5;
    string command_id   = 6;
    string tasked_at    = 7;
    int32  executed     = 8;
}o

// Generic success/failure reply
message CommandRespData {
    string status  = 1;
    string message = 2;
}

// ── Clients ───────────────────────────────────────────────────────────────────

message User {
    string code_name    = 1;
    string username     = 2;
    string hostname     = 3;
    string version      = 4;
    string ip           = 5;
    string pid          = 6;
    string last_checkin = 7;
}

message UserDetails {
    repeated User user = 1;
}

// ── Resolve code_name → guid ──────────────────────────────────────────────────

message ResolveResponse {
    string user_id = 1;
}

// ── Service ───────────────────────────────────────────────────────────────────

service MyService {
    rpc HealthCheck     (EmptyRequest)   returns (HealthCheckResponse);
    rpc InsertCommand   (CommandReqData) returns (CommandRespData);
    rpc ListClientsRPC  (CommandReqData) returns (UserDetails);
    rpc ResolveID       (CommandReqData) returns (ResolveResponse);
}
